name: Deploy With Environment
on:
  push:
    branches: [main]

permissions:
  contents: read
  deployments: write

jobs:
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29
      - name: Deploy
        run: ./deploy.sh production
