version: 1

# Extend step-usage-map with org-specific actions
step-usage-map:
  myorg/deploy-action: ["deployments:write", "environments:write"]
  myorg/publish-action: ["packages:write"]

# Add org-specific scanners
scanners:
  myorg/internal-sast: "SAST (internal)"

# Custom production environment names
prod-environments:
  - production
  - prod-eu
  - prod-us

# Exclude repos and workflows
exclude:
  repos:
    - org/sandbox
    - org/archive
  workflows:
    - .github/workflows/experimental.yml
