name: 'actions-comply'
description: 'Audit GitHub Actions workflows for SOC2 and ISO 27001 compliance'
author: 'automationpi'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  framework:
    description: 'Frameworks to audit: soc2, iso27001, or soc2,iso27001'
    required: false
    default: 'soc2,iso27001'
  period:
    description: 'Lookback days for run history'
    required: false
    default: '90'
  output:
    description: 'Output format: text, json, summary, pdf'
    required: false
    default: 'summary'
  fail-on:
    description: 'Exit code 1 if finding at or above this severity: critical, high, medium, low'
    required: false
    default: 'critical'
  config:
    description: 'Path to actions-comply.yml config file'
    required: false
    default: ''
  evidence-dir:
    description: 'Generate evidence package in this directory'
    required: false
    default: ''

outputs:
  total-findings:
    description: 'Total number of findings'
    value: ${{ steps.audit.outputs.total-findings }}
  failed-findings:
    description: 'Number of FAIL status findings'
    value: ${{ steps.audit.outputs.failed-findings }}
  critical-count:
    description: 'Number of critical severity findings'
    value: ${{ steps.audit.outputs.critical-count }}
  report-path:
    description: 'Path to generated report file'
    value: ${{ steps.audit.outputs.report-path }}
  passed:
    description: 'true if no findings at or above fail-on severity'
    value: ${{ steps.audit.outputs.passed }}

runs:
  using: 'composite'
  steps:
    - name: Setup Go
      uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88eb36e1752db003d
      with:
        go-version: '1.23'
        cache: false

    - name: Build actions-comply
      shell: bash
      run: |
        cd ${{ github.action_path }}
        go build -o $RUNNER_TEMP/comply ./cmd/comply

    - name: Run audit
      id: audit
      shell: bash
      env:
        INPUT_FRAMEWORK: ${{ inputs.framework }}
        INPUT_PERIOD: ${{ inputs.period }}
        INPUT_OUTPUT: ${{ inputs.output }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_EVIDENCE_DIR: ${{ inputs.evidence-dir }}
      run: |
        REPO_NAME="${GITHUB_REPOSITORY#*/}"
        WORKFLOW_DIR="${GITHUB_WORKSPACE}/.github/workflows"
        REPORT_PATH="${RUNNER_TEMP}/comply-report"

        # Set output extension based on format
        case "$INPUT_OUTPUT" in
          json) REPORT_PATH="${REPORT_PATH}.json" ;;
          pdf)  REPORT_PATH="${REPORT_PATH}.pdf" ;;
          *)    REPORT_PATH="${REPORT_PATH}.txt" ;;
        esac

        # Build command
        CMD="$RUNNER_TEMP/comply audit"
        CMD="$CMD --org ${GITHUB_REPOSITORY_OWNER}"
        CMD="$CMD --repos ${REPO_NAME}"
        CMD="$CMD --workflow-dir ${WORKFLOW_DIR}"
        CMD="$CMD --framework ${INPUT_FRAMEWORK}"
        CMD="$CMD --period ${INPUT_PERIOD}"
        CMD="$CMD --fail-on ${INPUT_FAIL_ON}"

        if [ "$INPUT_OUTPUT" = "summary" ]; then
          CMD="$CMD --output summary"
          CMD="$CMD --out ${REPORT_PATH}"
        else
          CMD="$CMD --output ${INPUT_OUTPUT}"
          CMD="$CMD --out ${REPORT_PATH}"
        fi

        if [ -n "$INPUT_CONFIG" ]; then
          CMD="$CMD --config ${INPUT_CONFIG}"
        fi

        if [ -n "$INPUT_EVIDENCE_DIR" ]; then
          CMD="$CMD --evidence-dir ${INPUT_EVIDENCE_DIR}"
        fi

        # Run audit and capture exit code
        set +e
        eval $CMD
        EXIT_CODE=$?
        set -e

        # Also run JSON to extract counts
        JSON_OUT=$($RUNNER_TEMP/comply audit \
          --org "${GITHUB_REPOSITORY_OWNER}" \
          --repos "${REPO_NAME}" \
          --workflow-dir "${WORKFLOW_DIR}" \
          --framework "${INPUT_FRAMEWORK}" \
          --period "${INPUT_PERIOD}" \
          --output json \
          --fail-on critical 2>/dev/null || true)

        TOTAL=$(echo "$JSON_OUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['summary']['total_findings'])" 2>/dev/null || echo "0")
        FAILS=$(echo "$JSON_OUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['summary']['count_by_status'].get('fail',0))" 2>/dev/null || echo "0")
        CRITS=$(echo "$JSON_OUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['summary']['count_by_severity'].get('critical',0))" 2>/dev/null || echo "0")

        # Set outputs
        echo "total-findings=${TOTAL}" >> $GITHUB_OUTPUT
        echo "failed-findings=${FAILS}" >> $GITHUB_OUTPUT
        echo "critical-count=${CRITS}" >> $GITHUB_OUTPUT
        echo "report-path=${REPORT_PATH}" >> $GITHUB_OUTPUT

        if [ "$EXIT_CODE" -eq 0 ]; then
          echo "passed=true" >> $GITHUB_OUTPUT
        else
          echo "passed=false" >> $GITHUB_OUTPUT
        fi

        # Write step summary if output is summary
        if [ "$INPUT_OUTPUT" = "summary" ] && [ -f "$REPORT_PATH" ]; then
          cat "$REPORT_PATH" >> $GITHUB_STEP_SUMMARY
        fi

        exit $EXIT_CODE
